<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">

https://cdnjs.cloudflare.com/ajax/libs/weather-icons/2.0.12/css/weather-icons.min.css

<style>
body {
  margin:0;
  background:#dfeaf4;
  font-family:Arial, sans-serif;
  display:grid;
  place-items:center;
  height:100vh;
}

.stage {
  width:1920px;
  height:1080px;
  background:#f4f8fb;
  display:flex;
  flex-direction:column;
}

/* TOP */
.top {
  height:230px;
  display:flex;
  border-bottom:6px solid #1b3a57;
}

.title {
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:90px;
  font-weight:700;
}

.current {
  flex:1;
  display:flex;
  justify-content:flex-end;
  align-items:center;
}

.current-row {
  display:flex;
  gap:24px;
}

.current-icon {
  font-size:110px;
}

.current-temp {
  font-size:90px;
}

/* FORECAST */
.row {
  flex:1;
  display:grid;
  grid-template-columns:repeat(3,1fr);
}

.panel {
  display:flex;
  flex-direction:column;
  align-items:center;
}

.period { font-size:60px; }

.icon {
  font-size:250px;
}

/* ✅ precipitation percent */
.pop {
  font-size:36px;
  font-weight:700;
  color:#2f5f8a;
  margin-top:-20px;
}

.temp {
  font-size:60px;
}
</style>
</head>

<body>

<div class="stage">

<div class="top">
  <div class="title">Providence Weather</div>
  <div class="current" id="current"></div>
</div>

<div class="row" id="row"></div>

</div>

<script>

function getIcon(condition,isNight){
  const c=condition.toLowerCase();

  if(c.includes("rain")||c.includes("shower")) return "wi-rain";
  if(c.includes("thunder")) return "wi-thunderstorm";
  if(c.includes("snow")) return "wi-snow";

  if(c.includes("cloud"))
    return isNight?"wi-night-alt-cloudy":"wi-day-cloudy";

  if(c.includes("clear")||c.includes("sun"))
    return isNight?"wi-night-clear":"wi-day-sunny";

  return isNight?"wi-night-alt-cloudy":"wi-day-cloudy";
}

async function load(){

const url="https://forecast.weather.gov/MapClick.php?lat=41.8239&lon=-71.412&FcstType=json";
const data=await fetch(url).then(r=>r.json());

const names=data.time.startPeriodName;
const temps=data.data.temperature;
const conditions=data.data.weather;
const pops=data.data.pop; // ✅ precipitation %

let html="";

for(let i=0;i<3;i++){

  const isNight=names[i].toLowerCase().includes("night");

  const isPrecip =
    conditions[i].toLowerCase().includes("rain") ||
    conditions[i].toLowerCase().includes("shower");

  html+=`
  <div class="panel">

    <div class="period">${names[i]}</div>

    <i class="wi ${getIcon(conditions[i],isNight)} icon"></i>

    ${
      isPrecip && pops[i]
      ? `<div class="pop">${pops[i]}%</div>`
      : ""
    }

    <div class="temp">
      ${temps[i]}°
    </div>

  </div>`;
}

document.getElementById("row").innerHTML=html;
}

load();
setInterval(load,300000);

</script>
</body>
</html>
