<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">

<!-- ✅ FIXED: proper stylesheet link -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/weather-icons/2.0.12/css/weather-icons.min.css">

<style>
body {
  margin:0;
  background:#dfeaf4;
  font-family:Arial, sans-serif;
  display:grid;
  place-items:center;
  height:100vh;
}

/* STAGE */
.stage {
  width:1920px;
  height:1080px;
  background:#f4f8fb;
  display:flex;
  flex-direction:column;
  border:8px solid #1b3a57;
  box-shadow:0 20px 40px rgba(0,0,0,.25);
}

/* TOP */
.top {
  height:230px;
  display:flex;
  border-bottom:6px solid #1b3a57;
  background:linear-gradient(#e6f0f8,#d6e6f5);
}

.title {
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:94px;
  font-weight:700;
  color:#17324d;
}

.current {
  flex:1;
  display:flex;
  justify-content:flex-end;
  align-items:center;
  padding-right:60px;
}

.current-inner {
  display:flex;
  flex-direction:column;
  align-items:center;
}

.current-header {
  font-size:28px;
  margin-bottom:5px;
  color:#355f84;
}

.updated-time {
  font-size:18px;
  color:#5a7fa6;
  margin-bottom:10px;
}

.current-row {
  display:flex;
  align-items:center;
  gap:24px;
}

.current-icon {
  font-size:110px;
  color:#3f6f9a;
}

.current-text-block {
  display:flex;
  flex-direction:column;
  align-items:center;
}

.current-temp {
  font-size:94px;
  font-weight:700;
  color:#0c2b45;
  line-height:1;
}

.current-text {
  font-size:34px;
  color:#3f6f9a;
  margin-top:6px;
}

/* FORECAST */
.row {
  flex:1;
  display:grid;
  grid-template-columns:repeat(3,1fr);
}

.panel {
  border-right:6px solid #1b3a57;
  display:flex;
  flex-direction:column;
  justify-content:space-around;
  align-items:center;
  padding:20px 0;
}

.panel:last-child { border-right:none; }

.period {
  font-size:62px;
  font-weight:700;
  color:#17324d;
}

.icon {
  font-size:250px;
  color:#3f6f9a;
  animation:pulse 3s ease-in-out infinite;
}

.temp {
  font-size:62px;
  font-weight:700;
  color:#0c2b45;
}

.footer {
  font-size:14px;
  text-align:center;
  padding:6px;
  color:#3c6b96;
  background:#d6e6f5;
  border-top:3px solid #1b3a57;
}

/* animation */
@keyframes pulse {
  0%   { transform:scale(1); opacity:0.95; }
  50%  { transform:scale(1.05); opacity:1; }
  100% { transform:scale(1); opacity:0.95; }
}
</style>
</head>

<body>

<div class="stage">

<div class="top">
  <div class="title">Providence Weather</div>
  <div class="current" id="current"></div>
</div>

<div class="row" id="row"></div>

<div class="footer">National Weather Service Data</div>

</div>

<script>
const LAT = 41.8239;
const LON = -71.412;

/* ✅ current clock time */
function getNowTime(){
  const now = new Date();
  let h = now.getHours();
  const m = String(now.getMinutes()).padStart(2,"0");
  const ampm = h >= 12 ? "PM" : "AM";
  h = h % 12;
  if (h === 0) h = 12;
  return `${h}:${m}${ampm}`;
}

/* ✅ observation time */
function formatTime(str){
  const match=str.match(/(\d{2}):(\d{2})/);
  if(!match) return str;
  let h=parseInt(match[1]);
  let m=match[2];
  const ampm = h>=12 ? "PM":"AM";
  h = h%12;
  if(h===0) h=12;
  return `${h}:${m}${ampm}`;
}

/* ✅ day/night */
function isDaytime(){
  const h = new Date().getHours();
  return h>=6 && h<18;
}

/* ✅ icon mapping */
function getIcon(cond,isNight){
  const c=cond.toLowerCase();
  if(c.includes("thunder")) return "wi-thunderstorm";
  if(c.includes("snow")) return "wi-snow";
  if(c.includes("rain")) return "wi-rain";
  if(c.includes("cloud")) return isNight?"wi-night-alt-cloudy":"wi-day-cloudy";
  if(c.includes("clear")) return isNight?"wi-night-clear":"wi-day-sunny";
  return "wi-day-sunny";
}

async function load(){

const url=`https://forecast.weather.gov/MapClick.php?lat=${LAT}&lon=${LON}&FcstType=json`;

const data=await fetch(url).then(r=>r.json());

const names=data.time.startPeriodName;
const temps=data.data.temperature;
const conditions=data.data.weather;
const current=data.currentobservation;

const dayNow=isDaytime();

/* CURRENT */
document.getElementById("current").innerHTML=`
<div class="current-inner">

  <div class="current-header">
    Conditions reported at ${formatTime(current.Date)}
  </div>

  <div class="updated-time" id="updated">
    Updated ${getNowTime()}
  </div>

  <div class="current-row">
    <i class="wi ${getIcon(current.Weather,!dayNow)} current-icon"></i>

    <div class="current-text-block">
      <div class="current-temp">${current.Temp}°</div>
      <div class="current-text">${current.Weather}</div>
    </div>
  </div>

</div>
`;

/* ✅ FORECAST */
let html="";

for(let i=0;i<3;i++){
  const isNight=names[i].toLowerCase().includes("night");

  html+=`
  <div class="panel">
    <div class="period">${names[i]}</div>

    <i class="wi ${getIcon(conditions[i],isNight)} icon"></i>

    <div class="temp">
      ${isNight?"Low":"High"} ${temps[i]}°
    </div>
  </div>`;
}

document.getElementById("row").innerHTML=html;

}

/* ✅ initial load */
load();

/* ✅ auto refresh every 5 minutes */
setInterval(load, 300000);

</script>

</body>
</html>
