<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">

<style>
body {
  margin:0;
  background:#dfeaf4;
  font-family:Arial, sans-serif;
  display:grid;
  place-items:center;
  height:100vh;
}

.stage {
  width:1920px;
  height:1080px;
  background:#f4f8fb;
  display:flex;
  flex-direction:column;
  border:8px solid #1b3a57;
}

.top {
  height:230px;
  display:flex;
  border-bottom:6px solid #1b3a57;
  background:linear-gradient(#e6f0f8,#d6e6f5);
}

.title {
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:90px;
  font-weight:700;
  color:#17324d;
}

.current {
  flex:1;
  display:flex;
  justify-content:flex-end;
  align-items:center;
  padding-right:60px;
}

.current-inner {
  display:flex;
  flex-direction:column;
  align-items:center;
}

.current-header {
  font-size:28px;
  color:#355f84;
}

.updated-time {
  font-size:18px;
  color:#5a7fa6;
  margin-bottom:10px;
}

.current-row {
  display:flex;
  align-items:center;
  gap:24px;
}

.current-icon {
  width:110px;
  height:110px;
}

.current-text-block {
  display:flex;
  flex-direction:column;
  align-items:center;
}

.current-temp {
  font-size:94px;
  font-weight:700;
}

.current-text {
  font-size:34px;
  color:#3f6f9a;
}

.row {
  flex:1;
  display:grid;
  grid-template-columns:repeat(3,1fr);
}

.panel {
  border-right:6px solid #1b3a57;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:space-around;
}

.panel:last-child {
  border-right:none;
}

.period {
  font-size:62px;
  font-weight:700;
}

/* ✅ NOAA icons */
.icon-img {
  width:220px;
  height:auto;
}

.temp {
  font-size:62px;
  font-weight:700;
}

</style>
</head>

<body>

<div class="stage">

<div class="top">
  <div class="title">Providence Weather</div>
  <div class="current" id="current"></div>
</div>

<div class="row" id="row"></div>

</div>

<script>
const LAT=41.8239;
const LON=-71.412;

/* helpers */
function getNowTime(){
  const d=new Date();
  let h=d.getHours();
  let m=String(d.getMinutes()).padStart(2,"0");
  let ampm=h>=12?"PM":"AM";
  h=h%12; if(h===0) h=12;
  return `${h}:${m}${ampm}`;
}

function formatTime(str){
  const d=new Date(str);
  if(!isNaN(d)){
    let h=d.getHours();
    let m=String(d.getMinutes()).padStart(2,"0");
    let ampm=h>=12?"PM":"AM";
    h=h%12; if(h===0) h=12;
    return `${h}:${m}${ampm}`;
  }
  return str;
}

async function load(){

// 1️⃣ point metadata
const point=await fetch(`https://api.weather.gov/points/${LAT},${LON}`).then(r=>r.json());

// 2️⃣ forecast
const forecast=await fetch(point.properties.forecast).then(r=>r.json());
const periods=forecast.properties.periods.slice(0,3);

// 3️⃣ station observations
const stations=await fetch(point.properties.observationStations).then(r=>r.json());
const station=stations.features[0].id;
const obs=await fetch(`${station}/observations/latest`).then(r=>r.json());

const tempC=obs.properties.temperature.value;
const tempF=Math.round(tempC*9/5+32);

/* CURRENT */
document.getElementById("current").innerHTML=`
<div class="current-inner">

  <div class="current-header">
    Conditions reported at ${formatTime(obs.properties.timestamp)}
  </div>

  <div class="updated-time">
    Updated ${getNowTime()}
  </div>

  <div class="current-row">
    <img src="${periods[0].icon}" class="current-icon">

    <div class="current-text-block">
      <div class="current-temp">${tempF}°</div>
      <div class="current-text">${obs.properties.textDescription}</div>
    </div>
  </div>

</div>
`;

/* FORECAST */
let html="";

for(let p of periods){

  html+=`
  <div class="panel">

    <div class="period">${p.name}</div>

    <img src="${p.icon}" class="icon-img">

    <div class="temp">
      ${p.isDaytime?"High":"Low"} ${p.temperature}°
    </div>

  </div>`;
}

document.getElementById("row").innerHTML=html;
}

load();
setInterval(load,300000);

</script>

</body>
</html>
